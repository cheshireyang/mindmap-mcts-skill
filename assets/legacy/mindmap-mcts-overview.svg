<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">MindMap-MCTS skill architecture</title>
  <desc id="desc">Architecture diagram showing Codex, the skill workflow, CLI tree engine, JSON state, Markdown view, and user steering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e6f4f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .card-title { font: 700 20px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .card-text { font: 500 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .pill { fill: #0f766e; }
      .pill-text { font: 700 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; letter-spacing: 0.5px; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .node { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .node-good { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .node-bad { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; }
      .node-text { font: 700 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect width="1180" height="620" fill="url(#bg)"/>
  <text class="title" x="70" y="72">MindMap-MCTS Skill</text>
  <text class="subtitle" x="70" y="104">Visible reasoning trees for complex Codex tasks, backed by a deterministic local tree engine.</text>

  <rect class="card" x="70" y="165" width="230" height="140" rx="14"/>
  <rect class="pill" x="92" y="188" width="82" height="26" rx="13"/>
  <text class="pill-text" x="112" y="206">AGENT</text>
  <text class="card-title" x="92" y="244">Codex</text>
  <text class="card-text" x="92" y="272">Generates hypotheses,</text>
  <text class="card-text" x="92" y="294">runs probes, records evidence.</text>

  <rect class="card" x="475" y="145" width="260" height="180" rx="14"/>
  <rect class="pill" x="497" y="168" width="72" height="26" rx="13"/>
  <text class="pill-text" x="518" y="186">SKILL</text>
  <text class="card-title" x="497" y="224">MindMap-MCTS Loop</text>
  <text class="card-text" x="497" y="253">select -> expand -> evaluate</text>
  <text class="card-text" x="497" y="275">-> backprop -> render</text>
  <text class="card-text" x="497" y="302">Stops on evidence or budget.</text>

  <rect class="card" x="875" y="165" width="235" height="140" rx="14"/>
  <rect class="pill" x="897" y="188" width="66" height="26" rx="13"/>
  <text class="pill-text" x="914" y="206">CLI</text>
  <text class="card-title" x="897" y="244">Tree Engine</text>
  <text class="card-text" x="897" y="272">Owns UCB selection,</text>
  <text class="card-text" x="897" y="294">state validation, backprop.</text>

  <path class="line" d="M300 235 C360 235, 405 235, 465 235"/>
  <path class="line" d="M735 235 C790 235, 820 235, 865 235"/>

  <rect class="card" x="220" y="405" width="220" height="120" rx="14"/>
  <text class="card-title" x="244" y="447">JSON Truth Source</text>
  <text class="card-text" x="244" y="476">Nodes, V/N scores, states,</text>
  <text class="card-text" x="244" y="498">evidence, parent links.</text>

  <rect class="card" x="500" y="405" width="220" height="120" rx="14"/>
  <text class="card-title" x="524" y="447">Markdown View</text>
  <text class="card-text" x="524" y="476">Readable outline rendered</text>
  <text class="card-text" x="524" y="498">from JSON state.</text>

  <rect class="card" x="780" y="405" width="220" height="120" rx="14"/>
  <text class="card-title" x="804" y="447">Human Steering</text>
  <text class="card-text" x="804" y="476">Inspect branches, add nodes,</text>
  <text class="card-text" x="804" y="498">or choose at hard forks.</text>

  <path class="line" d="M992 305 C992 350, 960 372, 910 397"/>
  <path class="line" d="M875 305 C790 355, 680 385, 600 402"/>
  <path class="line" d="M875 282 C700 370, 505 400, 430 430"/>
  <path class="soft-line" d="M780 465 C720 465, 720 465, 730 465"/>

  <circle class="node-good" cx="520" cy="360" r="23"/>
  <text class="node-text" x="510" y="365">V</text>
  <circle class="node" cx="582" cy="360" r="23"/>
  <text class="node-text" x="571" y="365">N</text>
  <circle class="node-bad" cx="644" cy="360" r="23"/>
  <text class="node-text" x="637" y="365">X</text>
</svg>

