<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Lightweight MCTS loop</title>
  <desc id="desc">A loop diagram for selection, expansion, evaluation, backpropagation, and rendering.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#115e59"/>
    </marker>
    <style>
      .bg { fill: #fbfdfc; }
      .title { font: 700 32px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .step { fill: #ffffff; stroke: #99f6e4; stroke-width: 2; rx: 16; }
      .step-title { font: 700 20px system-ui, -apple-system, Segoe UI, sans-serif; fill: #134e4a; }
      .step-text { font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .arrow { stroke: #115e59; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .code { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .badge { fill: #ccfbf1; stroke: #14b8a6; stroke-width: 1.5; }
    </style>
  </defs>
  <rect class="bg" width="1180" height="520"/>
  <text class="title" x="70" y="70">Lightweight MCTS Over A Reasoning Tree</text>
  <text class="subtitle" x="70" y="102">The agent supplies ideas and probes; the bundled CLI keeps the state and math deterministic.</text>

  <rect class="step" x="80" y="185" width="175" height="130" rx="16"/>
  <text class="step-title" x="112" y="225">1. Select</text>
  <text class="step-text" x="112" y="255">UCB picks the next</text>
  <text class="step-text" x="112" y="277">frontier branch.</text>
  <text class="code" x="112" y="302">select</text>

  <rect class="step" x="305" y="185" width="175" height="130" rx="16"/>
  <text class="step-title" x="334" y="225">2. Expand</text>
  <text class="step-text" x="334" y="255">Add 2-3 concrete,</text>
  <text class="step-text" x="334" y="277">testable children.</text>
  <text class="code" x="334" y="302">add</text>

  <rect class="step" x="530" y="185" width="175" height="130" rx="16"/>
  <text class="step-title" x="558" y="225">3. Evaluate</text>
  <text class="step-text" x="558" y="255">Run cheap real probes,</text>
  <text class="step-text" x="558" y="277">score with evidence.</text>
  <text class="code" x="558" y="302">eval / prune</text>

  <rect class="step" x="755" y="185" width="175" height="130" rx="16"/>
  <text class="step-title" x="776" y="225">4. Backprop</text>
  <text class="step-text" x="776" y="255">Update N and best</text>
  <text class="step-text" x="776" y="277">child value upward.</text>
  <text class="code" x="776" y="302">backprop</text>

  <rect class="step" x="980" y="185" width="130" height="130" rx="16"/>
  <text class="step-title" x="1004" y="225">5. Render</text>
  <text class="step-text" x="1004" y="255">Refresh the</text>
  <text class="step-text" x="1004" y="277">markdown view.</text>
  <text class="code" x="1004" y="302">render</text>

  <path class="arrow" d="M255 250 L295 250"/>
  <path class="arrow" d="M480 250 L520 250"/>
  <path class="arrow" d="M705 250 L745 250"/>
  <path class="arrow" d="M930 250 L970 250"/>
  <path class="arrow" d="M1045 315 C1045 430, 167 430, 167 325"/>

  <rect class="badge" x="418" y="382" width="342" height="44" rx="22"/>
  <text class="code" x="447" y="409">JSON is truth; Markdown is a view</text>
</svg>

